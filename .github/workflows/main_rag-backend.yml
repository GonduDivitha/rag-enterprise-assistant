name: Build and deploy Python app to Azure Web App - rag-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A82AEEBB4B0A46B2A42428F532D6C36B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C6C746453CE84B30A4DA6A25BC955830 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5CB5F9F39FC44D9DB6ED2DB97259C4D9 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: rag-backend
          slot-name: Production